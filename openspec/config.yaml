# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Go 1.25, Bubbletea TUI (charmbracelet/bubbletea v1.3.10), lipgloss v1.1.x, SQLite (modernc.org/sqlite v1.49.1)
  Architecture: Clean Architecture, cmd/ entrypoints, internal/ packages (multi-agent orchestration, pipeline, state, system)
  Agents: multi-agent support (claude, opencode, cursor, codex, gemini, vscode, windsurf, antigravity)
  Branding: KORTEX, Language: PT-BR, Icon: 🧠
  Style: gofmt, golangci-lint (.golangci.yml)

strict_tdd: true

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected internal/ packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex TUI flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Load go-testing skill when writing tests (internal/**/*_test.go)
    - Load branch-pr skill when creating PRs
    - Load issue-creation skill when creating GitHub issues
    - Follow existing code patterns in internal/ packages
  verify:
    - Run: go test ./...
    - Run: go vet ./...
    - Run: golangci-lint run
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  strict_tdd: true
  detected: "2026-04-24"

  runner:
    command: "go test ./..."
    framework: "Go standard testing"

  layers:
    unit:
      available: true
      tool: "go test"
    integration:
      available: true
      tool: "net/http/httptest (built-in)"
    e2e:
      available: true
      tool: "Docker-based E2E (e2e/docker-test.sh)"
      note: "Dockerfile.ubuntu, Dockerfile.fedora, Dockerfile.arch — triggered by RUN_FULL_E2E=1"
    tui:
      available: true
      tool: "Bubbletea model.Update() testing"

  coverage:
    available: true
    command: "go test -cover ./..."

  quality:
    linter:
      available: true
      command: "golangci-lint run"
    type_checker:
      available: true
      command: "go vet ./..."
    formatter:
      available: true
      command: "gofmt"
